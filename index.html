<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>書劍 | SHUJIAN.ORG</title>
    <meta name="author" content="書劍">
    <meta name="email" content="binary@shujian.org">
    <meta name="description" content="生命之所以精彩，是因為它有無限可能">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            opacity: 0;
            animation: pageFadeIn 1.6s ease-out forwards;
            transition: background 0.8s ease, color 0.8s ease, border-color 0.8s ease, box-shadow 0.8s ease;
        }

        /* JS添加class控制 */
        body.dark {
            background: #030306;
            color: #f2f2f6;
        }

        body.light {
            background: #f7f9fe;
            color: #12121c;
        }

        /* CSS原生系统主题兜底（JS失效时也能生效） */
        @media (prefers-color-scheme: dark) {
            body:not(.light) {
                background: #030306;
                color: #f2f2f6;
            }

            body:not(.light) #bg-canvas {
                opacity: 0.4;
            }

            body:not(.light) .domain-title {
                background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899, #3b82f6);
                background-size: 300% 300%;
                -webkit-background-clip: text;
                color: transparent;
                animation: gradientFlow 10s linear infinite;
            }

            body:not(.light) .nav-item {
                border: 1px solid rgba(255, 255, 255, 0.12);
                color: #f2f2f6;
            }

            body:not(.light) .nav-item::before {
                background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.18), transparent);
            }

            body:not(.light) .nav-item:hover {
                border-color: #8b5cf6;
                box-shadow: 0 0 30px rgba(139, 92, 246, 0.25);
            }

            body:not(.light) .theme-toggle {
                background: rgba(255, 255, 255, 0.08);
                color: #fff;
            }
        }

        @media (prefers-color-scheme: light) {
            body:not(.dark) {
                background: #f7f9fe;
                color: #12121c;
            }

            body:not(.dark) #bg-canvas {
                opacity: 0.1;
            }

            body:not(.dark) .domain-title {
                color: #5b21b6;
                background: none;
                animation: none;
            }

            body:not(.dark) .nav-item {
                border: 1px solid rgba(0, 0, 0, 0.12);
                color: #12121c;
            }

            body:not(.dark) .nav-item::before {
                background: linear-gradient(90deg, transparent, rgba(124, 58, 237, 0.12), transparent);
            }

            body:not(.dark) .nav-item:hover {
                border-color: #7c3aed;
                box-shadow: 0 0 30px rgba(124, 58, 237, 0.18);
            }

            body:not(.dark) .theme-toggle {
                background: rgba(0, 0, 0, 0.06);
                color: #111;
            }
        }

        @keyframes pageFadeIn {
            to {
                opacity: 1;
            }
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transition: opacity 0.8s ease;
        }

        body.dark #bg-canvas {
            opacity: 0.4;
        }

        body.light #bg-canvas {
            opacity: 0.1;
        }

        .wrapper {
            z-index: 10;
            text-align: center;
            padding: 2rem;
        }

        .domain-title {
            font-size: 4rem;
            font-weight: 100;
            letter-spacing: 10px;
            margin-bottom: 18px;
        }

        body.dark .domain-title {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899, #3b82f6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            color: transparent;
            animation: gradientFlow 10s linear infinite;
        }

        body.light .domain-title {
            color: #5b21b6;
            background: none;
            animation: none;
        }

        @keyframes gradientFlow {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 300% 50%;
            }
        }

        .signature {
            font-size: 1.4rem;
            letter-spacing: 4px;
            margin-bottom: 22px;
            font-weight: 300;
            transition: opacity 0.8s ease;
        }

        body.dark .signature {
            opacity: 0.8;
        }

        body.light .signature {
            opacity: 0.75;
        }

        .motto {
            font-size: 1.25rem;
            margin-bottom: 48px;
            font-weight: 200;
            letter-spacing: 1px;
            transition: opacity 0.8s ease;
        }

        body.dark .motto {
            opacity: 0.65;
        }

        body.light .motto {
            opacity: 0.6;
        }

        .nav-links {
            display: flex;
            gap: 28px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-item {
            padding: 14px 32px;
            border-radius: 9999px;
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.2, 0, 0.2, 1);
            backdrop-filter: blur(6px);
            position: relative;
            overflow: hidden;
        }

        body.dark .nav-item {
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #f2f2f6;
        }

        body.light .nav-item {
            border: 1px solid rgba(0, 0, 0, 0.12);
            color: #12121c;
        }

        .nav-item::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            transition: left 0.6s ease;
        }

        body.dark .nav-item::before {
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.18), transparent);
        }

        body.light .nav-item::before {
            background: linear-gradient(90deg, transparent, rgba(124, 58, 237, 0.12), transparent);
        }

        .nav-item:hover::before {
            left: 100%;
        }

        body.dark .nav-item:hover {
            border-color: #8b5cf6;
            transform: translateY(-6px);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.25);
            opacity: 0.95;
        }

        body.light .nav-item:hover {
            border-color: #7c3aed;
            transform: translateY(-6px);
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.18);
            opacity: 0.9;
        }

        .footer-copy {
            position: absolute;
            bottom: 36px;
            font-size: 0.82rem;
            letter-spacing: 1px;
            transition: opacity 0.8s ease;
        }

        body.dark .footer-copy {
            opacity: 0.35;
        }

        body.light .footer-copy {
            opacity: 0.45;
        }

        .theme-toggle {
            position: fixed;
            right: 24px;
            bottom: 36px;
            z-index: 99;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            transition: all 0.5s ease;
        }

        body.dark .theme-toggle {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        body.light .theme-toggle {
            background: rgba(0, 0, 0, 0.06);
            color: #111;
        }

        @media (max-width: 640px) {
            .domain-title {
                font-size: 2.4rem;
                letter-spacing: 4px;
            }

            .signature {
                font-size: 1.1rem;
            }

            .nav-links {
                flex-direction: column;
                gap: 16px;
            }

            .theme-toggle {
                right: 12px;
                bottom: 20px;
                width: 38px;
                height: 38px;
            }
        }
    </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="wrapper">
    <h1 class="domain-title">SHUJIAN.ORG</h1>
    <div class="signature">書劍</div>
    <p class="motto">生命之所以精彩，是因為它有無限可能</p>
    <div class="nav-links">
        <a class="nav-item" href="https://github.com/chenguanyou/" target="_blank">GITHUB</a>
        <a class="nav-item" href="mailto:binary@shujian.org">EMAIL</a>
    </div>
</div>
<div class="footer-copy">© SHUJIAN.ORG ｜ 書劍</div>
<button class="theme-toggle" id="toggleBtn">☀</button>

<script>
    const body = document.body;
    const toggleBtn = document.getElementById('toggleBtn');
    let isLight = false;
    const STORAGE_KEY = 'site-theme-mode';
    const media = window.matchMedia('(prefers-color-scheme: light)');

    // 统一更新所有状态（DOM+变量+按钮）
    function updateMode(lightMode) {
        isLight = lightMode;
        if (lightMode) {
            body.classList.remove('dark');
            body.classList.add('light');
            toggleBtn.textContent = '☾';
        } else {
            body.classList.remove('light');
            body.classList.add('dark');
            toggleBtn.textContent = '☀';
        }
    }

    // 保存手动选择
    function saveMode(lightMode) {
        localStorage.setItem(STORAGE_KEY, lightMode ? 'light' : 'dark');
        updateMode(lightMode);
    }

    // 系统切换回调（实时同步页面）
    function onSystemChange(e) {
        // 存在手动记录则忽略系统变化
        if (localStorage.getItem(STORAGE_KEY)) return;
        updateMode(e.matches);
    }

    // 初始化逻辑
    function initTheme() {
        const userSet = localStorage.getItem(STORAGE_KEY);
        // console.log(userSet);
        // 1. 用户手动设置优先
        if (userSet === 'light') {
            updateMode(true);
            return;
        }
        if (userSet === 'dark') {
            updateMode(false);
            return;
        }
        // 2. 无手动设置，跟随系统
        updateMode(media.matches);
    }

    // 绑定系统明暗实时监听
    media.addEventListener('change', onSystemChange);
    // 切换按钮点击
    toggleBtn.addEventListener('click', () => {
        saveMode(!isLight);
    });

    // ---------------------- 粒子画布 ----------------------
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];

    function resizeCanvas() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
        constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.radius = Math.random() * 1.4 + 0.15;
            this.speedX = Math.random() * 0.35 - 0.175;
            this.speedY = Math.random() * 0.35 - 0.175;
            this.opacity = Math.random() * 0.7 + 0.08;
            this.twinkle = Math.random() * Math.PI * 2;
        }

        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.twinkle += 0.015;
            if (this.x < 0) this.x = width;
            if (this.x > width) this.x = 0;
            if (this.y < 0) this.y = height;
            if (this.y > height) this.y = 0;
        }

        draw() {
            const flicker = Math.sin(this.twinkle) * 0.25 + this.opacity;
            let dotColor, glowColor;
            if (isLight) {
                dotColor = `rgba(100, 70, 200, ${flicker})`;
                glowColor = `rgba(124, 58, 237, ${flicker * 0.06})`;
            } else {
                dotColor = `rgba(167, 139, 250, ${flicker})`;
                glowColor = `rgba(139, 92, 246, ${flicker * 0.08})`;
            }
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = dotColor;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius * 2.2, 0, Math.PI * 2);
            ctx.fillStyle = glowColor;
            ctx.fill();
        }
    }

    function initParticles() {
        particles = [];
        for (let i = 0; i < 150; i++) particles.push(new Particle());
    }

    initParticles();

    function connectParticles() {
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 110) {
                    ctx.beginPath();
                    if (isLight) {
                        ctx.strokeStyle = `rgba(100, 110, 200, ${0.1 - dist / 1000})`;
                    } else {
                        ctx.strokeStyle = `rgba(156, 163, 255, ${0.22 - dist / 500})`;
                    }
                    ctx.lineWidth = 0.35;
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.stroke();
                }
            }
        }
    }

    function animate() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        connectParticles();
        requestAnimationFrame(animate);
    }

    animate();
    // 页面加载执行初始化
    initTheme();
</script>
</body>
</html>
