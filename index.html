<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>書劍 | SHUJIAN.ORG</title>
    <meta name="author" content="書劍">
    <meta name="email" content="binary@shujian.org">
    <meta name="description" content="生命之所以精彩，是因為它有無限可能">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #030306;
            color: #f2f2f6;
            font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            opacity: 0;
            animation: pageFadeIn 1.6s ease-out forwards;
        }
        /* 頁面載入淡入 */
        @keyframes pageFadeIn {
            to { opacity: 1; }
        }
        /* 粒子背景畫布 */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.4;
        }
        .wrapper {
            z-index: 10;
            text-align: center;
            padding: 2rem;
        }
        /* 大寫域名標題 流光漸變 */
        .domain-title {
            font-size: 4rem;
            font-weight: 100;
            letter-spacing: 10px;
            margin-bottom: 18px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899, #3b82f6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            color: transparent;
            animation: gradientFlow 10s linear infinite;
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }
        /* 繁體署名 */
        .signature {
            font-size: 1.4rem;
            letter-spacing: 4px;
            opacity: 0.8;
            margin-bottom: 22px;
            font-weight: 300;
        }
        /* 標語 */
        .motto {
            font-size: 1.25rem;
            opacity: 0.65;
            margin-bottom: 48px;
            font-weight: 200;
            letter-spacing: 1px;
        }
        /* 導航按鈕組 */
        .nav-links {
            display: flex;
            gap: 28px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .nav-item {
            padding: 14px 32px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 9999px;
            color: #f2f2f6;
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.2, 0, 0.2, 1);
            backdrop-filter: blur(6px);
            position: relative;
            overflow: hidden;
        }
        .nav-item::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.18), transparent);
            transition: left 0.6s ease;
        }
        .nav-item:hover::before {
            left: 100%;
        }
        .nav-item:hover {
            border-color: #8b5cf6;
            transform: translateY(-6px);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.25);
            opacity: 0.95;
        }
        /* 底部版權 */
        .footer-copy {
            position: absolute;
            bottom: 36px;
            font-size: 0.82rem;
            opacity: 0.35;
            letter-spacing: 1px;
        }
        /* 手機端自適應 */
        @media (max-width: 640px) {
            .domain-title {
                font-size: 2.4rem;
                letter-spacing: 4px;
            }
            .signature {
                font-size: 1.1rem;
            }
            .nav-links {
                flex-direction: column;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- 星雲粒子動態背景 -->
    <canvas id="bg-canvas"></canvas>
    <div class="wrapper">
        <h1 class="domain-title">SHUJIAN.ORG</h1>
        <div class="signature">書劍</div>
        <p class="motto">生命之所以精彩，是因為它有無限可能</p>
        <div class="nav-links">
            <a class="nav-item" href="https://github.com/chenguanyou/" target="_blank">GITHUB</a>
            <a class="nav-item" href="mailto:binary@shujian.org">EMAIL</a>
        </div>
    </div>
    <div class="footer-copy">© SHUJIAN.ORG ｜ 書劍</div>

    <script>
        // 粒子星空背景優化版（增加發光暈層次）
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * 1.4 + 0.15;
                this.speedX = Math.random() * 0.35 - 0.175;
                this.speedY = Math.random() * 0.35 - 0.175;
                this.opacity = Math.random() * 0.7 + 0.08;
                this.twinkle = Math.random() * Math.PI * 2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.twinkle += 0.015;
                // 邊界循環
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            draw() {
                const flicker = Math.sin(this.twinkle) * 0.25 + this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(167, 139, 250, ${flicker})`;
                ctx.fill();
                // 輕微外發光
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 2.2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(139, 92, 246, ${flicker * 0.08})`;
                ctx.fill();
            }
        }

        // 初始化粒子數量150，層次更豐富但不卡頓
        function initParticles() {
            particles = [];
            for(let i = 0; i < 150; i++) particles.push(new Particle());
        }
        initParticles();

        // 粒子連線，遠距離透明淡化
        function connectParticles() {
            for(let i = 0; i < particles.length; i++) {
                for(let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < 110) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(156, 163, 255, ${0.22 - dist/500})`;
                        ctx.lineWidth = 0.35;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // 動畫迴圈
        function animate() {
            ctx.clearRect(0,0,width,height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            connectParticles();
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
